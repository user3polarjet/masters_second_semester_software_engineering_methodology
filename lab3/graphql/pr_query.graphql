query PrQuery($owner: String!, $name: String!, $cursor: String) {
  repository(owner: $owner, name: $name) {
    pullRequests(first: 50, after: $cursor) {
      pageInfo {
        hasNextPage
        endCursor
      }
      nodes {
        number
        title
        body
        author {
          __typename  # <-- ADDED THIS
          login
        }
        additions
        deletions
        changedFiles
        createdAt
        mergedAt
        closedAt
        reviewDecision
        labels(first: 20) {
          nodes {
            name
          }
        }
        comments(first: 50) {
          nodes {
            author {
              __typename  # <-- ADDED THIS
              login
            }
            body
            createdAt
          }
        }
        commits(first: 50) {
          nodes {
            commit {
              committedDate
              messageHeadline
            }
          }
        }
        reviews(first: 50) {
          nodes {
            author {
              __typename  # <-- ADDED THIS
              login
            }
            state
            createdAt
          }
        }
      }
    }
  }
}
